name: Build Windows Release
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 预安装Windows编译依赖
      - name: Install Windows build tools
        run: |
          choco install visualstudio2022-buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools" -y

      - name: Build Windows release
        run: flutter build windows --release --verbose

      - name: Verify output folder
        run: Test-Path ./build/windows/x64/release

      - name: Archive release files
        run: Compress-Archive -Path ./build/windows/x64/release -DestinationPath PixEz-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixEz-Windows安装包
          path: PixEz-Windows.zip
