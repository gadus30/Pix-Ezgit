name: PixEz Windows打包
on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Windows-latest 自带完整VS2022+C++工具，无需choco手动安装
      - name: 验证VS编译环境
        run: flutter doctor -v

      - name: 拉取依赖
        run: flutter pub get

      - name: 编译Windows正式包
        run: flutter build windows --release

      - name: 压缩成品
        run: Compress-Archive build/windows/x64/release PixEz_Win成品.zip

      - name: 上传下载包
        uses: actions/upload-artifact@v4
        with:
          name: Windows客户端压缩包
          path: PixEz_Win成品.zip
