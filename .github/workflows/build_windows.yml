name: PixEz Windows 无FVM打包
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 手动一键打包

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 拉取完整源码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 纯净安装Flutter，不使用FVM
      - name: 配置Flutter稳定版
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 下载全部依赖
      - name: 安装项目依赖
        run: flutter pub get

      # 生成必要代码
      - name: 生成构建代码
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 编译Windows正式发行包
      - name: 编译Release程序
        run: flutter build windows --release

      # 压缩打包
      - name: 压缩成品文件夹
        run: Compress-Archive -Path build/windows/x64/release -DestinationPath PixEz_Windows.zip

      # 上传安装包，打包完成可下载
      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: PixEz Windows完整程序
          path: PixEz_Windows.zip
