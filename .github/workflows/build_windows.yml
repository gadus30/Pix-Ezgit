name: Build Windows
on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      # 重点！这里把 pixez 改成你的 Flutter 项目文件夹名字
      - name: 进入项目文件夹
        run: cd pixez

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      - name: 开启Windows桌面编译
        run: flutter config --enable-windows-desktop

      - name: 下载依赖
        run: flutter pub get

      - name: 打包Windows安装包
        run: flutter build windows --release

      - name: 上传打包文件
        uses: actions/upload-artifact@v4
        with:
          name: Windows安装包
          path: pixez/build/windows/x64/runner/Release
