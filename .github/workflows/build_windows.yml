name: Windows Build

# 触发条件：推送代码到master分支、手动触发工作流
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 拉取仓库源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 配置系统环境（按需替换你的项目依赖）
      - name: Setup build environment
        run: |
          echo "配置编译依赖环境"
          choco install 7zip --no-progress

      # 编译项目，替换为你自己的编译命令
      - name: Build project
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release

      # 打包编译输出文件
      - name: Package release files
        run: |
          7z a release-windows.zip ./build/Release/*

      # 上传打包产物到工作流
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows安装包
          path: release-windows.zip
