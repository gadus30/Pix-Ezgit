name: Flutter Windows Release打包
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: 拉取项目源码
        uses: actions/checkout@v4

      - name: 配置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: 关闭Flutter统计上报
        run: flutter config --no-analytics

      - name: 安装项目依赖
        run: flutter pub get

      - name: 编译Windows正式安装包
        run: flutter build windows --release

      - name: 压缩打包产物
        run: |
          choco install 7zip -y --no-progress
          7z a Windows-release.zip ./build/windows/x64/runner/Release/*

      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: Windows安装包
          path: Windows-release.zip
