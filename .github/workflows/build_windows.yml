name: PixEz Windows 打包
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置Flutter稳定版
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装项目依赖
        run: flutter pub get

      # 删掉build_runner代码生成步骤，直接编译
      - name: 编译Release程序
        run: flutter build windows --release

      - name: 压缩成品文件夹
        run: Compress-Archive -Path build/windows/x64/release -DestinationPath PixEz_Windows.zip

      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: PixEz Windows完整程序
          path: PixEz_Windows.zip
