name: PixEz Windows 打包
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置Flutter稳定版
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装项目依赖
        run: flutter pub get

      - name: 编译Release程序
        run: flutter build windows --release

      # 新增：打印目录，排查是否生成文件
      - name: 查看编译输出目录
        run: ls build/windows/x64/release -ErrorAction SilentlyContinue

      # 打包前判断文件夹是否存在
      - name: 压缩成品文件夹
        run: |
          $target = "build/windows/x64/release"
          if (Test-Path $target) {
            Compress-Archive -Path $target -DestinationPath PixEz_Windows.zip
          } else {
            Write-Error "编译目录不存在，打包终止"
            exit 1
          }

      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: PixEz Windows完整程序
          path: PixEz_Windows.zip
